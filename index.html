<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Untai — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ======================= AUTH SCREEN ======================= -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-mark">U</div>
      <h1>Untai</h1>
      <p class="auth-tag">Chat sederhana, terhubung lewat ID unik.</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Masuk</button>
      <button class="auth-tab" data-tab="register">Daftar</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" class="auth-form">
      <label class="field">
        <span>ID / Username</span>
        <input type="text" id="login-username" placeholder="mis. rani.dev" autocomplete="username" required />
      </label>
      <label class="field">
        <span>Kata sandi</span>
        <input type="password" id="login-password" placeholder="Kata sandi" autocomplete="current-password" required />
      </label>
      <p class="auth-error" id="login-error"></p>
      <button type="submit" class="btn-primary" id="login-submit">Masuk</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" class="auth-form hidden">
      <label class="field">
        <span>Nama tampilan</span>
        <input type="text" id="register-name" placeholder="mis. Rani Putri" required />
      </label>
      <label class="field">
        <span>ID / Username unik</span>
        <input type="text" id="register-username" placeholder="huruf kecil, angka, titik, garis bawah" autocomplete="username" required />
        <small class="field-hint" id="username-hint">3–20 karakter: a-z, 0-9, titik, garis bawah.</small>
      </label>
      <label class="field">
        <span>Kata sandi</span>
        <input type="password" id="register-password" placeholder="Minimal 6 karakter" autocomplete="new-password" required />
      </label>
      <p class="auth-error" id="register-error"></p>
      <button type="submit" class="btn-primary" id="register-submit">Buat akun</button>
    </form>
  </div>
</div>

<!-- ======================= CHAT SCREEN ======================= -->
<div id="app-screen" class="app-screen hidden">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="me">
        <div class="avatar" id="me-avatar">U</div>
        <div class="me-info">
          <div class="me-name" id="me-name">—</div>
          <div class="me-id" id="me-id">—</div>
        </div>
      </div>
      <button id="logout-btn" class="icon-btn" title="Keluar" aria-label="Keluar">⏻</button>
    </div>

    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Cari ID untuk mulai chat…" autocomplete="off" />
      <div id="search-results" class="search-results hidden"></div>
    </div>

    <div class="chat-list" id="chat-list">
      <div class="empty-state" id="chat-list-empty">
        <p>Belum ada percakapan.</p>
        <p class="empty-sub">Cari ID unik teman kamu di atas untuk memulai.</p>
      </div>
    </div>
  </aside>

  <main class="chat-panel">
    <div id="chat-empty" class="chat-empty">
      <div class="chat-empty-mark">✳</div>
      <h2>Pilih percakapan</h2>
      <p>Cari seseorang lewat ID unik mereka, lalu mulai mengobrol.</p>
    </div>

    <div id="chat-active" class="chat-active hidden">
      <header class="chat-header">
        <div class="avatar" id="chat-avatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-header-name">—</div>
          <div class="chat-header-id" id="chat-header-id">—</div>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <form id="message-form" class="message-form">
        <input type="text" id="message-input" placeholder="Tulis pesan…" autocomplete="off" required />
        <button type="submit" class="send-btn" aria-label="Kirim">➤</button>
      </form>
    </div>
  </main>
</div>

<!-- ======================= FIREBASE ======================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
